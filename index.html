<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pull to Refresh - Bell Loader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #FAFAFA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: #1A1A1A;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: 15px;
      color: #666;
      margin-bottom: 40px;
    }

    .variants {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 400px;
    }

    .variant-card {
      flex: 1;
      background: #FFFFFF;
      border: 1px solid #E5E5E5;
      border-radius: 16px;
      padding: 24px 16px;
      text-align: center;
      text-decoration: none;
      color: #1A1A1A;
      transition: box-shadow 0.2s ease, transform 0.15s ease;
    }

    .variant-card:active {
      transform: scale(0.97);
    }

    .variant-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .variant-card .icon {
      width: 48px;
      height: 48px;
      background: #F0F0F0;
      border-radius: 12px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .variant-card .icon svg {
      width: 22px;
      height: 26px;
    }

    .variant-card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .variant-card span {
      font-size: 13px;
      color: #999;
    }

    .bottom-sheet-icon {
      background: #ECECEC !important;
      border-radius: 8px 8px 0 0 !important;
      height: 36px !important;
      position: relative;
      overflow: hidden;
    }

    .bottom-sheet-icon::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: white;
      border-radius: 6px 6px 0 0;
    }

    .full-page-icon {
      background: #FFFFFF !important;
      border: 1px solid #E5E5E5;
    }
  </style>
</head>
<body>
  <h1>Pull to Refresh</h1>
  <p>Bell loader animation prototype</p>

  <div class="variants">
    <a class="variant-card" href="./bottom-sheet/">
      <div class="icon bottom-sheet-icon"></div>
      <h2>Bottom Sheet</h2>
      <span>Card overlay style</span>
    </a>
    <a class="variant-card" href="./full-page/">
      <div class="icon full-page-icon">
        <svg viewBox="0 0 22 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15.1836 21.4385C15.0641 23.8386 13.1154 25.7371 10.7158 25.7373C8.23883 25.7373 6.24147 23.7144 6.24121 21.2051L15.1836 21.4385ZM10.7158 0C15.67 0.000172337 19.6641 4.06585 19.6641 9.06543V10.6406C19.6641 11.9245 20.3746 13.0334 21.4307 13.5781V18.3643H0V13.5781C1.05615 13.0334 1.7666 11.9051 1.7666 10.6406V9.06543C1.7666 4.06574 5.76152 0 10.7158 0Z" fill="#D3D3CA"/>
        </svg>
      </div>
      <h2>Full Page</h2>
      <span>Full screen style</span>
    </a>
  </div>
</body>
</html>
